name: Weekly Review

on:
  schedule:
    # Sunday 20:00 Taipei = Sunday 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: Asia/Taipei
        run: python scripts/weekly_review.py
      - run: |
          git config user.name "yoga-agent"
          git config user.email "agent@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "weekly review $(TZ=Asia/Taipei date +%F)"
          git push

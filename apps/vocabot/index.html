<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beeper the Vocab Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07071a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    padding: 20px;
  }
  .title {
    font-size: 1.8em;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 18px;
    background: linear-gradient(90deg, #ff6b9d, #45b7d1, #96f7d2, #ffa502);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  canvas {
    border-radius: 18px;
    box-shadow: 0 0 60px rgba(69,183,209,0.25), 0 0 120px rgba(69,183,209,0.08);
    max-width: 100%;
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  button {
    padding: 13px 32px;
    border: none;
    border-radius: 50px;
    font-size: 1em;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
  }
  button:hover { transform: scale(1.06); }
  #recordBtn {
    background: linear-gradient(135deg, #ff6b9d, #ff4757);
    color: white;
    box-shadow: 0 4px 20px rgba(255,71,87,0.4);
  }
  #downloadBtn {
    background: linear-gradient(135deg, #2ed573, #45b7d1);
    color: #07071a;
    display: none;
    box-shadow: 0 4px 20px rgba(46,213,115,0.4);
  }
  #status {
    margin-top: 12px;
    font-size: 0.88em;
    opacity: 0.6;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="title">✨ Beeper's Vocabulary Showcase ✨</div>
<canvas id="stage" width="960" height="540"></canvas>
<div class="controls">
  <button id="recordBtn">⏺ &nbsp;Record MP4</button>
  <button id="downloadBtn">⬇ &nbsp;Download Video</button>
</div>
<p id="status">Watch Beeper teach you fancy words! Hit Record to save as video.</p>

<script>
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;

const WORD_DURATION = 5500;

const words = [
  { word: 'SERENDIPITY',    def: 'Finding something wonderful\nwithout looking for it',      color: '#FF6B9D' },
  { word: 'EPHEMERAL',      def: 'Lasting for a very short time;\ntransient and fleeting',    color: '#45B7D1' },
  { word: 'MELLIFLUOUS',    def: 'Sweet-sounding and\npleasant to hear',                      color: '#96F7D2' },
  { word: 'PERSPICACIOUS',  def: 'Having sharp insight\nand keen judgment',                   color: '#FFA502' },
  { word: 'LOQUACIOUS',     def: 'Tending to talk a great deal;\nvery chatty',                color: '#FF6348' },
  { word: 'INEFFABLE',      def: 'Too great or extreme\nto be expressed in words',            color: '#A29BFE' },
  { word: 'QUINTESSENTIAL', def: 'Representing the most\nperfect example of something',      color: '#2ED573' },
  { word: 'SERAPHIC',       def: 'Characteristic of an angel;\ncalm and blissfully serene',  color: '#FD79A8' },
];
const TOTAL = words.length * WORD_DURATION;

// Stars
const stars = Array.from({ length: 150 }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  r: Math.random() * 1.4 + 0.2,
  twinkle: Math.random() * Math.PI * 2,
  speed: Math.random() * 2 + 1
}));

// Particles
const particles = [];
function spawnParticle(x, y, color) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y, color,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 1, r: Math.random() * 4 + 2
    });
  }
}

let mouthOpen = 0, mouthDir = 1, talking = false;
let lastWordIndex = -1;
let startTime = null;

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeIn(t)  { return t * t * t; }

function drawBG(t) {
  const g = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.75);
  g.addColorStop(0, '#0d1b3e');
  g.addColorStop(1, '#050510');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    const a = 0.4 + 0.5 * Math.sin(t * 0.001 * s.speed + s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });

  // floor glow
  const fg = ctx.createLinearGradient(0, H * 0.83, 0, H);
  fg.addColorStop(0, 'rgba(69,183,209,0.08)');
  fg.addColorStop(1, 'transparent');
  ctx.fillStyle = fg;
  ctx.fillRect(0, H * 0.83, W, H * 0.17);
}

function drawRobot(t, color) {
  const rx = 168, ry = H * 0.56;
  const hover = Math.sin(t * 0.0022) * 9;

  // shadow
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(rx, H * 0.88, 52 - Math.abs(hover) * 0.3, 11, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0,0,0,${0.35 - Math.abs(hover) * 0.01})`;
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(rx, ry + hover);

  // --- BODY ---
  rr(-40, 18, 80, 82, 14);
  const bg = ctx.createLinearGradient(-40, 18, 40, 100);
  bg.addColorStop(0, '#243660');
  bg.addColorStop(1, '#152040');
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // screen on body
  rr(-28, 28, 56, 30, 8);
  ctx.fillStyle = 'rgba(10,20,50,0.9)';
  ctx.fill();
  ctx.strokeStyle = color + '99';
  ctx.lineWidth = 1;
  ctx.stroke();
  // screen text
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  const words_scroll = ['AI', 'NLP', 'LLM', 'GPT', 'ML', 'RAG'];
  ctx.fillText(words_scroll[Math.floor(t / 600) % words_scroll.length], 0, 48);

  // body buttons
  [0, 1, 2].forEach(i => {
    ctx.beginPath();
    ctx.arc(-15 + i * 15, 72, 5, 0, Math.PI * 2);
    const lit = Math.floor(t / 400) % 3 === i;
    ctx.fillStyle = lit ? color : '#0d1a36';
    ctx.fill();
    ctx.strokeStyle = color + '88';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // --- ARMS ---
  const arm = Math.sin(t * 0.003) * 0.28;
  ctx.save();
  ctx.translate(-40, 34);
  ctx.rotate(-0.25 + arm);
  rr(-24, -9, 24, 18, 7);
  ctx.fillStyle = '#1e3060';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  // hand
  ctx.beginPath();
  ctx.arc(-24, 0, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#243660';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.translate(40, 34);
  ctx.rotate(0.25 - arm);
  rr(0, -9, 24, 18, 7);
  ctx.fillStyle = '#1e3060';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(24, 0, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#243660';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.stroke();
  ctx.restore();

  // --- LEGS ---
  [-20, 20].forEach((x, i) => {
    const lb = (i === 0 ? 1 : -1) * Math.sin(t * 0.003) * 4;
    rr(x - 13, 98 + lb, 26, 32, 8);
    ctx.fillStyle = '#1a2a50';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    rr(x - 17, 127 + lb, 34, 12, 6);
    ctx.fillStyle = '#101830';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // --- HEAD ---
  rr(-44, -82, 88, 74, 20);
  const hg = ctx.createLinearGradient(-44, -82, 44, -8);
  hg.addColorStop(0, '#2e4a80');
  hg.addColorStop(1, '#182a55');
  ctx.fillStyle = hg;
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // visor
  rr(-36, -74, 72, 38, 11);
  ctx.fillStyle = 'rgba(69,183,209,0.12)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(69,183,209,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // eyes
  const blink = Math.sin(t * 0.001) > 0.96 ? 0.12 : 1;
  [-20, 20].forEach(ex => {
    const eg = ctx.createRadialGradient(ex, -54, 0, ex, -54, 13);
    eg.addColorStop(0, color);
    eg.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.ellipse(ex, -54, 13, 13 * blink, 0, 0, Math.PI * 2);
    ctx.fillStyle = eg;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ex, -54, 8, 8 * blink, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex + 2, -53, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#001020';
    ctx.fill();
    // shine
    ctx.beginPath();
    ctx.arc(ex + 4, -57, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();
  });

  // mouth
  if (talking) {
    mouthOpen += mouthDir * 0.1;
    if (mouthOpen >= 1) mouthDir = -1;
    if (mouthOpen <= 0) mouthDir = 1;
  } else {
    mouthOpen = Math.max(0, mouthOpen - 0.05);
  }

  ctx.beginPath();
  ctx.arc(0, -24, 18, 0.1, Math.PI - 0.1);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  if (mouthOpen > 0.04) {
    ctx.beginPath();
    ctx.ellipse(0, -21 + 6 * mouthOpen, 14, 9 * mouthOpen, 0, 0, Math.PI);
    ctx.fillStyle = '#000c22';
    ctx.fill();
    // teeth
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    [-8, 0, 8].forEach(tx => ctx.fillRect(tx - 4, -21, 7, 5 * mouthOpen));
  }

  // cheek blush
  [-38, 38].forEach(bx => {
    const blush = ctx.createRadialGradient(bx, -30, 0, bx, -30, 14);
    blush.addColorStop(0, 'rgba(255,120,150,0.25)');
    blush.addColorStop(1, 'transparent');
    ctx.fillStyle = blush;
    ctx.beginPath();
    ctx.ellipse(bx, -30, 14, 9, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  // --- ANTENNA ---
  ctx.beginPath();
  ctx.moveTo(0, -82);
  ctx.lineTo(0, -112);
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.stroke();
  const ap = 0.65 + 0.35 * Math.sin(t * 0.006);
  const ag = ctx.createRadialGradient(0, -118, 0, 0, -118, 22);
  ag.addColorStop(0, color);
  ag.addColorStop(0.5, color + '66');
  ag.addColorStop(1, 'transparent');
  ctx.fillStyle = ag;
  ctx.beginPath();
  ctx.arc(0, -118, 22, 0, Math.PI * 2);
  ctx.globalAlpha = ap * 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.arc(0, -118, 9, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // name badge
  rr(-36, 140, 72, 22, 8);
  ctx.fillStyle = color + '33';
  ctx.fill();
  ctx.strokeStyle = color + '88';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.font = 'bold 12px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText('B E E P E R', 0, 155);

  ctx.restore();
}

function drawWordPanel(t, wi, phase, color) {
  const ENTER = WORD_DURATION * 0.16;
  const EXIT  = WORD_DURATION * 0.84;
  let alpha = 1, yOff = 0;

  if (phase < ENTER) {
    alpha = easeOut(phase / ENTER);
    yOff  = (1 - alpha) * -55;
    talking = true;
  } else if (phase > EXIT) {
    alpha = 1 - easeIn((phase - EXIT) / (WORD_DURATION - EXIT));
    yOff  = (1 - alpha) * 45;
    talking = false;
  } else {
    talking = true;
  }

  const w = words[wi];
  const cx = W * 0.595, cy = H * 0.32;

  ctx.save();
  ctx.globalAlpha = alpha;

  // card backdrop
  const cardW = 470, cardH = 160;
  rr(cx - cardW / 2, cy + yOff - 70, cardW, cardH, 18);
  ctx.fillStyle = 'rgba(10,20,50,0.55)';
  ctx.fill();
  ctx.strokeStyle = color + '44';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // word
  ctx.shadowColor = color;
  ctx.shadowBlur = 28;
  ctx.font = 'bold 64px "Segoe UI", Arial';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(w.word, cx, cy + yOff);
  ctx.shadowBlur = 0;

  // underline
  const tw = ctx.measureText(w.word).width;
  const uy = cy + yOff + 8;
  const lg = ctx.createLinearGradient(cx - tw / 2, uy, cx + tw / 2, uy);
  lg.addColorStop(0, 'transparent');
  lg.addColorStop(0.5, color);
  lg.addColorStop(1, 'transparent');
  ctx.strokeStyle = lg;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx - tw / 2, uy);
  ctx.lineTo(cx + tw / 2, uy);
  ctx.stroke();

  // definition typewriter
  const defStart = ENTER + 200;
  const defProg  = phase > defStart ? Math.min((phase - defStart) / 1800, 1) : 0;
  const lines = w.def.split('\n');
  const fullLen = lines.join('').length;
  const visible = Math.floor(defProg * fullLen);

  ctx.font = '26px "Segoe UI", Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  let charsSeen = 0;
  lines.forEach((line, li) => {
    const show = Math.max(0, Math.min(line.length, visible - charsSeen));
    ctx.fillText(line.substring(0, show), cx, cy + yOff + 52 + li * 36);
    charsSeen += line.length;
  });
  ctx.shadowBlur = 0;

  // blinking cursor
  if (defProg >= 1 && Math.floor(t / 520) % 2 === 0) {
    const lastLine = lines[lines.length - 1];
    const lw = ctx.measureText(lastLine).width;
    ctx.fillStyle = color;
    ctx.fillRect(cx + lw / 2 + 5, cy + yOff + 32 + (lines.length - 1) * 36, 3, 22);
  }

  // word counter dots
  const dotY = cy + yOff + 115;
  words.forEach((_, i) => {
    ctx.beginPath();
    ctx.arc(cx + (i - (words.length - 1) / 2) * 20, dotY, i === wi ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle = i === wi ? color : 'rgba(255,255,255,0.2)';
    ctx.fill();
  });

  ctx.restore();
}

function drawHUD(t, wi, color) {
  // top bar
  ctx.font = 'bold 19px "Segoe UI"';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.textAlign = 'left';
  ctx.fillText("✨  BEEPER's Vocabulary Showcase", 30, 34);

  // progress bar
  const prog = (t % TOTAL) / TOTAL;
  rr(30, 44, W - 60, 5, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fill();
  rr(30, 44, (W - 60) * prog, 5, 3);
  ctx.fillStyle = color;
  ctx.fill();

  // speech bubble tail & text
  const bx = 268, by = H * 0.18;
  ctx.save();
  ctx.globalAlpha = 0.85;
  rr(bx, by, 260, 48, 14);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fill();
  ctx.strokeStyle = color + '66';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // tail
  ctx.beginPath();
  ctx.moveTo(bx + 30, by + 48);
  ctx.lineTo(bx + 10, by + 68);
  ctx.lineTo(bx + 55, by + 48);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fill();
  ctx.font = 'bold 16px "Segoe UI"';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'center';
  ctx.fillText('Word ' + (wi + 1) + ' of ' + words.length, bx + 130, by + 20);
  ctx.font = '13px "Segoe UI"';
  ctx.fillStyle = color;
  ctx.fillText('Learn something fancy! 🤓', bx + 130, by + 38);
  ctx.restore();
}

// particles update
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
    else {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.restore();
    }
  }
}

function animate(ts) {
  if (!startTime) startTime = ts;
  const t = ts - startTime;
  const wi = Math.floor((t % TOTAL) / WORD_DURATION);
  const phase = (t % TOTAL) % WORD_DURATION;
  const color = words[wi].color;

  if (wi !== lastWordIndex) {
    spawnParticle(W * 0.595, H * 0.32, color);
    lastWordIndex = wi;
  }

  drawBG(t);
  drawHUD(t, wi, color);
  drawRobot(t, color);
  drawWordPanel(t, wi, phase, color);
  updateParticles();

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

// ─── MediaRecorder Export ───────────────────────────────────────
let recorder = null, chunks = [];

document.getElementById('recordBtn').addEventListener('click', () => {
  if (recorder && recorder.state === 'recording') {
    recorder.stop();
    document.getElementById('recordBtn').textContent = '⏺ \u00A0Record MP4';
    document.getElementById('status').textContent = 'Processing video…';
    return;
  }

  startTime = null;
  chunks = [];
  const stream = canvas.captureStream(30);
  const mime = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm']
    .find(m => MediaRecorder.isTypeSupported(m));

  recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 5_000_000 });
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: mime });
    const url  = URL.createObjectURL(blob);
    const btn  = document.getElementById('downloadBtn');
    btn.style.display = 'inline-block';
    btn.onclick = () => {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'beeper-vocab.' + (mime.includes('mp4') ? 'mp4' : 'webm');
      a.click();
    };
    document.getElementById('status').textContent =
      `✅ Ready! ${(blob.size / 1024 / 1024).toFixed(1)} MB — click Download.`;
  };

  recorder.start(100);
  document.getElementById('recordBtn').textContent = '⏹ \u00A0Stop Recording';
  document.getElementById('status').textContent =
    `🔴 Recording all ${words.length} words (${(TOTAL / 1000).toFixed0()}s)… or stop anytime.`;

  setTimeout(() => {
    if (recorder && recorder.state === 'recording') {
      recorder.stop();
      document.getElementById('recordBtn').textContent = '⏺ \u00A0Record MP4';
    }
  }, TOTAL + 600);
});

String.prototype.toFixed0 = function() { return Math.round(+this).toString(); };
Number.prototype.toFixed0 = function() { return Math.round(this).toString(); };
</script>
</body>
</html>

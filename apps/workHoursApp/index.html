<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office Leave Time Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
  <div id="root"></div>

  <script type="module">
    import React, { useMemo, useState } from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import { Clock, Calendar, LogOut, Target } from "https://esm.sh/lucide-react@0.468.0";

    function WorkHoursCalculator() {
      const [arrivalTime, setArrivalTime] = useState("06:55");
      const [targetLeaveTime, setTargetLeaveTime] = useState("15:45");

      const calculateTimes = (arrival, targetLeave) => {
        const [arrHours, arrMinutes] = arrival.split(":").map(Number);
        const [targetHours, targetMinutes] = targetLeave.split(":").map(Number);

        const arrivalDate = new Date();
        arrivalDate.setHours(arrHours, arrMinutes, 0, 0);

        const targetLeaveDate = new Date();
        targetLeaveDate.setHours(targetHours, targetMinutes, 0, 0);

        // Regular: 7.5 working hours + 1 hour lunch = 8.5 hours total
        const regularLeave = new Date(arrivalDate.getTime() + 8.5 * 60 * 60 * 1000);

        // If regular schedule is enough, no leave is needed.
        if (regularLeave <= targetLeaveDate) {
          return {
            regular: regularLeave,
            needsLeave: false,
            targetLeave: targetLeaveDate
          };
        }

        // Leave options in 15-minute increments.
        const leaveOptions = [15, 30, 45, 60, 75].map((leaveMins) => {
          const hoursToWork = 7.75 - (leaveMins - 15) / 60;
          const canLeaveAt = new Date(arrivalDate.getTime() + hoursToWork * 60 * 60 * 1000);

          const leaveEnd = new Date(arrivalDate.getTime() + 8.5 * 60 * 60 * 1000);
          const leaveStart = new Date(leaveEnd.getTime() - leaveMins * 60 * 1000);

          return {
            leaveMins,
            canLeaveAt,
            leaveStart,
            leaveEnd,
            meetsTarget: canLeaveAt <= targetLeaveDate
          };
        });

        const minLeaveNeeded = leaveOptions.find((opt) => opt.meetsTarget);

        return {
          regular: regularLeave,
          needsLeave: true,
          leaveOptions,
          minLeaveNeeded,
          targetLeave: targetLeaveDate
        };
      };

      const formatTime = (date) =>
        date.toLocaleTimeString("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        });

      const formatTime12 = (date) =>
        date.toLocaleTimeString("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: true
        });

      const times = useMemo(
        () => calculateTimes(arrivalTime, targetLeaveTime),
        [arrivalTime, targetLeaveTime]
      );

      return React.createElement(
        "div",
        { className: "max-w-3xl mx-auto" },
        React.createElement(
          "div",
          { className: "bg-white rounded-lg shadow-lg p-8" },
          React.createElement(
            "div",
            { className: "flex items-center gap-3 mb-6" },
            React.createElement(Clock, { className: "w-8 h-8 text-indigo-600" }),
            React.createElement(
              "h1",
              { className: "text-3xl font-bold text-gray-800" },
              "Office Leave Time Calculator"
            )
          ),

          React.createElement(
            "div",
            { className: "grid grid-cols-1 md:grid-cols-2 gap-4 mb-8" },
            React.createElement(
              "div",
              null,
              React.createElement(
                "label",
                { className: "block text-sm font-medium text-gray-700 mb-2" },
                "Arrival Time"
              ),
              React.createElement("input", {
                type: "time",
                value: arrivalTime,
                onChange: (e) => setArrivalTime(e.target.value),
                className:
                  "w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-lg"
              })
            ),
            React.createElement(
              "div",
              null,
              React.createElement(
                "label",
                { className: "block text-sm font-medium text-gray-700 mb-2" },
                "Target Leave Time"
              ),
              React.createElement("input", {
                type: "time",
                value: targetLeaveTime,
                onChange: (e) => setTargetLeaveTime(e.target.value),
                className:
                  "w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-lg"
              })
            )
          ),

          React.createElement(
            "div",
            { className: "space-y-4" },
            React.createElement(
              "div",
              { className: "bg-green-50 border-l-4 border-green-500 p-6 rounded-r-lg" },
              React.createElement(
                "div",
                { className: "flex items-start gap-3" },
                React.createElement(LogOut, { className: "w-6 h-6 text-green-600 mt-1" }),
                React.createElement(
                  "div",
                  { className: "flex-1" },
                  React.createElement(
                    "h3",
                    { className: "text-lg font-semibold text-gray-800 mb-2" },
                    "Regular Work Schedule"
                  ),
                  React.createElement(
                    "p",
                    { className: "text-sm text-gray-600 mb-3" },
                    "7.5 working hours + 1 hour lunch + 30 min buffer"
                  ),
                  React.createElement(
                    "div",
                    { className: "bg-white p-4 rounded-lg" },
                    React.createElement(
                      "p",
                      { className: "text-sm text-gray-600" },
                      "Leave office at:"
                    ),
                    React.createElement(
                      "p",
                      { className: "text-3xl font-bold text-green-600" },
                      formatTime12(times.regular)
                    ),
                    React.createElement(
                      "p",
                      { className: "text-xs text-gray-500 mt-1" },
                      "(",
                      formatTime(times.regular),
                      ")"
                    )
                  )
                )
              )
            ),

            !times.needsLeave
              ? React.createElement(
                  "div",
                  { className: "bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-lg" },
                  React.createElement(
                    "div",
                    { className: "flex items-center gap-3" },
                    React.createElement(Target, { className: "w-6 h-6 text-blue-600" }),
                    React.createElement(
                      "div",
                      null,
                      React.createElement(
                        "p",
                        { className: "text-lg font-semibold text-gray-800" },
                        "✓ No leave needed!"
                      ),
                      React.createElement(
                        "p",
                        { className: "text-sm text-gray-600 mt-1" },
                        "Regular schedule already allows leaving at ",
                        formatTime(times.targetLeave)
                      )
                    )
                  )
                )
              : React.createElement(
                  "div",
                  { className: "bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-lg" },
                  React.createElement(
                    "div",
                    { className: "flex items-start gap-3" },
                    React.createElement(Calendar, { className: "w-6 h-6 text-blue-600 mt-1" }),
                    React.createElement(
                      "div",
                      { className: "flex-1" },
                      React.createElement(
                        "h3",
                        { className: "text-lg font-semibold text-gray-800 mb-4" },
                        "Leave Options to Reach Target (",
                        formatTime(times.targetLeave),
                        ")"
                      ),
                      times.minLeaveNeeded &&
                        React.createElement(
                          "div",
                          { className: "bg-green-100 border border-green-300 p-3 rounded-lg mb-4" },
                          React.createElement(
                            "p",
                            { className: "text-sm font-semibold text-green-800" },
                            "✓ Minimum leave needed: ",
                            times.minLeaveNeeded.leaveMins,
                            " minutes"
                          )
                        ),
                      React.createElement(
                        "div",
                        { className: "space-y-3" },
                        times.leaveOptions.map((option) =>
                          React.createElement(
                            "div",
                            {
                              key: option.leaveMins,
                              className: `bg-white p-4 rounded-lg border-2 ${
                                option.meetsTarget ? "border-green-300" : "border-gray-200"
                              }`
                            },
                            React.createElement(
                              "div",
                              { className: "flex justify-between items-start" },
                              React.createElement(
                                "div",
                                null,
                                React.createElement(
                                  "p",
                                  { className: "font-semibold text-gray-800" },
                                  option.leaveMins,
                                  " minutes leave"
                                ),
                                React.createElement(
                                  "p",
                                  { className: "text-xs text-gray-500 mt-1" },
                                  "Leave period: ",
                                  formatTime(option.leaveStart),
                                  " - ",
                                  formatTime(option.leaveEnd)
                                )
                              ),
                              React.createElement(
                                "div",
                                { className: "text-right" },
                                React.createElement(
                                  "p",
                                  { className: "text-sm text-gray-600" },
                                  "Leave at:"
                                ),
                                React.createElement(
                                  "p",
                                  {
                                    className: `text-xl font-bold ${
                                      option.meetsTarget ? "text-green-600" : "text-gray-600"
                                    }`
                                  },
                                  formatTime(option.canLeaveAt)
                                ),
                                option.meetsTarget &&
                                  React.createElement(
                                    "p",
                                    { className: "text-xs text-green-600 mt-1" },
                                    "✓ Meets target"
                                  )
                              )
                            )
                          )
                        )
                      )
                    )
                  )
                )
          ),

          React.createElement(
            "div",
            { className: "mt-6 p-4 bg-gray-50 rounded-lg" },
            React.createElement(
              "h4",
              { className: "font-semibold text-gray-700 mb-2" },
              "Notes:"
            ),
            React.createElement(
              "ul",
              { className: "text-sm text-gray-600 space-y-1" },
              React.createElement(
                "li",
                null,
                "• Regular schedule: 30-minute clock-out buffer (7.5 hours acceptable)"
              ),
              React.createElement(
                "li",
                null,
                "• Leave options: Each has 30-min buffer before and after leave period"
              ),
              React.createElement("li", null, "• All calculations include 1-hour lunch break"),
              React.createElement("li", null, "• Leave periods are scheduled at end of workday")
            )
          )
        )
      );
    }

    createRoot(document.getElementById("root")).render(React.createElement(WorkHoursCalculator));
  </script>
</body>
</html>

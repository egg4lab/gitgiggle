name: Yoga Planner — Weekly Review

on:
  schedule:
    # Sunday 20:00 Taipei = Sunday 12:00 UTC
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r apps/prana/scripts/requirements.txt

      - name: Generate weekly review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
          TZ: Asia/Taipei
        run: python apps/prana/scripts/weekly_review.py

      - name: Commit log
        run: |
          git config user.name "yoga-agent"
          git config user.email "agent@users.noreply.github.com"
          git add apps/prana/logs/
          git diff --staged --quiet || git commit -m "yoga weekly review $(TZ=Asia/Taipei date +%F)"
          git push

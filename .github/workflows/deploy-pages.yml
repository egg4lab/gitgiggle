# Deploy full site from main (apps/fastingApp, apps/ashtangaApp, projects/…).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-gitgiggle
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Git LFS for large MP4 under apps/ashtangaApp/videos)
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Configure Pages
        uses: actions/configure-pages@v4
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

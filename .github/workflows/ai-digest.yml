name: AI Digest

on:
  schedule:
    - cron: '0 23 * * *'  # 23:00 UTC = 07:00 Asia/Taipei
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch AI/LLM news
        id: news
        env:
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
        run: |
          RESPONSE=$(curl -s "https://newsapi.org/v2/everything?q=AI+LLM+large+language+model&sortBy=publishedAt&pageSize=7&language=en&apiKey=${NEWS_KEY}")
          echo "news_json<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Summarize with Claude Haiku
        id: summary
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          NEWS_JSON: ${{ steps.news.outputs.news_json }}
        run: |
          cat << 'PYEOF' > /tmp/summarize.py
          import os, json, urllib.request

          news_json = os.environ["NEWS_JSON"]
          anthropic_key = os.environ["ANTHROPIC_KEY"]

          data = json.loads(news_json)
          articles = data.get("articles", [])[:7]

          lines = []
          for i, a in enumerate(articles, 1):
              title = a.get("title") or "No title"
              desc = a.get("description") or "No description"
              url = a.get("url") or ""
              lines.append(f"{i}. {title}\n   {desc}\n   URL: {url}")
          articles_text = "\n\n".join(lines)

          prompt = f"""Summarize these 7 AI/LLM news articles into an HTML email digest.
          Use <h2> for the title "AI/LLM Daily Digest", <ol> for the list, and for each <li>
          include the article title as a hyperlink and a 1-2 sentence summary.

          Articles:
          {articles_text}"""

          payload = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1500,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": anthropic_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              },
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())

          digest = result["content"][0]["text"]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("digest<<EOF\n")
              f.write(digest + "\n")
              f.write("EOF\n")

          print("Digest generated successfully")
          PYEOF
          python3 /tmp/summarize.py

      - name: Send email via EmailJS
        env:
          EJS_SERVICE: ${{ secrets.EJS_SERVICE }}
          EJS_TEMPLATE: ${{ secrets.EJS_TEMPLATE }}
          EJS_PUBLIC: ${{ secrets.EJS_PUBLIC }}
          DIGEST: ${{ steps.summary.outputs.digest }}
        run: |
          cat << 'PYEOF' > /tmp/send_email.py
          import os, json, urllib.request
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          digest = os.environ["DIGEST"]

          payload = json.dumps({
              "service_id": os.environ["EJS_SERVICE"],
              "template_id": os.environ["EJS_TEMPLATE"],
              "user_id": os.environ["EJS_PUBLIC"],
              "template_params": {
                  "to_email": "susanho91@hotmail.com",
                  "subject": f"AI/LLM Daily Digest - {today}",
                  "digest_html": digest,
                  "date": today
              }
          }).encode()

          req = urllib.request.Request(
              "https://api.emailjs.com/api/v1.0/email/send",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST"
          )
          with urllib.request.urlopen(req) as r:
              print(f"Email sent: {r.status} {r.read().decode()}")
          PYEOF
          python3 /tmp/send_email.py

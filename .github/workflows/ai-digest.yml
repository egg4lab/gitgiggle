name: AI Digest

on:
  schedule:
    - cron: '17 22 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch news & summarize with Claude Haiku
        id: summary
        env:
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: python3 .github/scripts/summarize.py

      - name: Send email via Brevo API
        env:
          BREVO_KEY: ${{ secrets.BREVO_KEY }}
          DIGEST: ${{ steps.summary.outputs.digest }}
        run: python3 .github/scripts/send_email.py

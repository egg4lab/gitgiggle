name: Daily Lesson Plan

on:
  schedule:
    # 06:00 Taipei = 22:00 UTC previous day
    - cron: '0 22 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate daily plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: Asia/Taipei
        run: python scripts/daily_plan.py

      - name: Commit log
        run: |
          git config user.name "yoga-agent"
          git config user.email "agent@users.noreply.github.com"
          git add logs/
          git diff --staged --quiet || git commit -m "daily plan $(TZ=Asia/Taipei date +%F)"
          git push

# Example waiver list for intentional, documented custom layer usage.
# Copy to waivers.yaml and extend as engineers request waivers.
# A waiver suppresses exactly one (cell, layer, dt) combination -- it does
# not blanket-waive a layer across the whole block.

waivers:
  - cell: TESTCELL_A
    layer: 63
    dt: 0
    reason: "Intentional legacy cap for characterization test structure"
    owner: "jdoe"
    expires: "2026-12-31"   # optional; omit if the waiver has no expiry

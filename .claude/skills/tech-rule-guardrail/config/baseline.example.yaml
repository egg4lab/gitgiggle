# Example technology-layer legality baseline.
# Copy to a per-node file (e.g. baseline_nodeX.yaml), fill in real layer/
# datatype numbers from the node's layer map + technology layer
# definitions, and version-control it so every check run is traceable to a
# baseline revision.

node: nodeX
version: 1

# Layer/datatype pairs that are legal to use, with the purposes they're
# legal for. "purposes" is informational for now; the check engine treats
# any (layer, dt) present here as legal regardless of purpose.
allowed:
  - {layer: 31, dt: 0, name: M1, purposes: [drawing, pin]}
  - {layer: 32, dt: 0, name: M2, purposes: [drawing, pin]}
  - {layer: 33, dt: 0, name: M3, purposes: [drawing, pin]}

# Layers that still exist in the layer map but should no longer be used in
# new data. Usage is flagged with category "deprecated".
deprecated:
  - {layer: 63, dt: 0, name: OLDCAP}

# Layers reserved for internal/tool use that should never appear in
# delivered data. Usage is flagged with category "reserved".
reserved:
  - {layer: 99, dt: 99}

  # DEMO STAND-IN: GPDK045 is a generic teaching PDK with no real OPC/RET
  # layer defined anywhere in its DRC/LVS decks (confirmed by searching the
  # Assura/Diva rule files directly). Layer 69/0 is genuinely defined in
  # gpdk045.layermap as "FUSE", unrelated to OPC in real life -- it's
  # repurposed here purely to exercise the guardrail mechanism against a
  # layer number that actually exists in this technology, rather than an
  # arbitrary invented number. Replace with the real OPC-reserved
  # layer/datatype once known from the actual target process.
  - {layer: 69, dt: 0, name: FUSE_pretend_OPC}
